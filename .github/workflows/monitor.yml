name: Monitor cosmetics

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: cosme-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: self-hosted
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: python -m pip install -e .[dev]

      - name: Install Playwright browsers
        shell: pwsh
        run: playwright install chromium

      - name: Run tests
        shell: pwsh
        run: pytest -q

      - name: Run monitor
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ENABLED_BRANDS: CHANEL,Dior,YSL
          ENABLED_ARTICLE_BRANDS: DIOR,YSL
          STATE_FILE: seen-products.json
        run: python -m cosme_monitor

      - name: Commit updated state
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen-products.json
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { exit 0 }
          git commit -m "chore: update seen monitor state"
          git push
