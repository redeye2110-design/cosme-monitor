name: Monitor cosmetics

on:
  # NOTE: GitHub's scheduled (cron) events are best-effort and heavily throttled
  # — a */10 cron only fired a few times per hour in practice. The 10-min cadence
  # is now driven by a local Windows Task Scheduler task (run_local.ps1) on the
  # self-hosted runner PC, which runs the monitor directly. workflow_dispatch is
  # kept for manual runs.
  workflow_dispatch:

concurrency:
  group: cosme-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: self-hosted
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Startup jitter
        shell: pwsh
        run: Start-Sleep -Seconds (Get-Random -Minimum 0 -Maximum 90)

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: python -m pip install -e .[dev]

      - name: Install Playwright browsers
        shell: pwsh
        run: python -m playwright install chromium

      - name: Install Patchright browser
        shell: pwsh
        run: python -m patchright install chromium

      - name: Run tests
        shell: pwsh
        run: python -m pytest -q

      - name: Run monitor
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ENABLED_BRANDS: CHANEL,Dior,YSL
          ENABLED_ARTICLE_BRANDS: DIOR,YSL,CHANEL
          STATE_FILE: seen-products.json
        run: python -m cosme_monitor

      - name: Commit updated state
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen-products.json
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { exit 0 }
          git commit -m "chore: update seen monitor state"
          git push
