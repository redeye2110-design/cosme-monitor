name: Monitor cosmetics

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: cosme-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: self-hosted
    timeout-minutes: 10
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          if [ "$RUNNER_OS" = "Linux" ]; then
            playwright install-deps chromium
          fi

      - name: Run tests
        run: pytest -q

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ENABLED_BRANDS: CHANEL,Dior,YSL
          ENABLED_ARTICLE_BRANDS: DIOR,YSL
          STATE_FILE: seen-products.json
        run: python -m cosme_monitor

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen-products.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update seen monitor state"
          git push
